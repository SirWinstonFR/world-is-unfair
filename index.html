<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carte Monde — Pays &amp; Régions</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body, #map { width:100%; height:100%; }
body { font-family: system-ui, -apple-system, sans-serif; background:#0d1f35; }

/* Cacher les contrôles Leaflet par défaut qu'on remplace */
.leaflet-control-zoom { display:none; }

/* Panneau nom en haut à droite */
#panel {
  position: fixed; top:14px; right:14px; z-index:1000;
  background: rgba(8,14,26,0.88);
  border: 1px solid rgba(100,140,200,0.2);
  border-radius: 10px; padding: 10px 16px;
  backdrop-filter: blur(8px);
  min-width: 140px; text-align: right;
  pointer-events: none;
}
#p-name { font-size:15px; font-weight:500; color:#fff; }
#p-sub  { font-size:10px; color:rgba(140,170,220,.5); text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }

/* Badge bas-centre */
#badge {
  position: fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:1000;
  background: rgba(8,14,26,0.85); border:1px solid rgba(100,140,200,0.18);
  border-radius:14px; padding:5px 14px; font-size:11px;
  color:rgba(150,180,230,.65); backdrop-filter:blur(8px);
  pointer-events:none;
}

/* Bouton retour */
#btn-back {
  position:fixed; bottom:48px; left:50%; transform:translateX(-50%); z-index:1000;
  display:none; background:rgba(12,22,40,.9); border:1px solid rgba(100,140,200,.22);
  border-radius:14px; padding:6px 16px; font-size:12px; color:#b8cef0;
  cursor:pointer; backdrop-filter:blur(8px);
}
#btn-back:hover { background:rgba(100,140,200,.15); }

/* Loader */
#loader {
  position:fixed; inset:0; z-index:2000;
  display:flex; align-items:center; justify-content:center; gap:14px;
  background:#0d1f35; transition:opacity .4s;
}
#loader.hidden { opacity:0; pointer-events:none; }
.spin {
  width:28px; height:28px; border:2px solid rgba(100,150,220,.15);
  border-top-color:#6090cc; border-radius:50%;
  animation: s .7s linear infinite;
}
@keyframes s { to { transform:rotate(360deg); } }
#loader p { font-size:13px; color:rgba(140,170,220,.6); }
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><p>Chargement de la carte…</p></div>
<div id="map"></div>
<div id="panel"><div id="p-name">Carte Monde</div><div id="p-sub">Cliquez sur un pays</div></div>
<div id="badge">Vue mondiale — pays</div>
<button id="btn-back">← Retour aux pays</button>

<script>
/* ══════════════════════════════════════════════════════════
   CARTE LEAFLET — Pays + Régions
══════════════════════════════════════════════════════════ */

/* Couleurs */
const C = {
  ocean:        '#0d2240',
  land:         '#4a5a6a',
  landHover:    '#6a7a8c',
  landSelected: '#d4a030',
  border:       '#2a3a50',
  borderHover:  '#8aaccc',
  regionBase:   '#4e5f70',
  regionBorder: '#2a3848',
  regionSelected: '#d4a030',
};

const REGIONS_DIR = 'regions_data';
const ZOOM_REGIONS = 5;   // zoom Leaflet au-dessus duquel on affiche les régions

/* ── Map Leaflet ── */
const map = L.map('map', {
  center: [25, 10], zoom: 3,
  zoomControl: false,
  minZoom: 2, maxZoom: 10,
});

/* Fond océan uni (tuile vide colorée) */
L.tileLayer('', { attribution: '' }).addTo(map);
document.getElementById('map').style.background = C.ocean;

/* ── État ── */
let countriesLayer = null;   // L.GeoJSON des pays
let regionsLayer   = null;   // L.GeoJSON des régions du pays actif
let selectedCountry = null;  // { name, feature, layer }
let regionsIndex   = null;
const regionsCache = {};

/* ══ CHARGEMENT PAYS ══ */
async function loadCountries() {
  const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
  const topo = await res.json();
  const geo  = topojson.feature(topo, topo.objects.countries);

  countriesLayer = L.geoJSON(geo, {
    style: countryStyle,
    onEachFeature: (feat, layer) => {
      layer.on({ mouseover: onCountryOver, mouseout: onCountryOut, click: onCountryClick });
    }
  }).addTo(map);

  document.getElementById('loader').classList.add('hidden');
}

function countryStyle(feat) {
  const sel = selectedCountry && feat.properties.name === selectedCountry.name;
  return {
    fillColor:   sel ? C.landSelected : C.land,
    fillOpacity: 0.9,
    color:       C.border,
    weight:      0.6,
    opacity:     1,
  };
}

function onCountryOver(e) {
  const layer = e.target;
  const isSelected = selectedCountry && layer.feature.properties.name === selectedCountry.name;
  if (!isSelected) layer.setStyle({ fillColor: C.landHover, weight: 1, color: C.borderHover });
  layer.bringToFront();
  setPanel(layer.feature.properties.name || '—', 'Pays');
}
function onCountryOut(e) {
  const layer = e.target;
  const isSelected = selectedCountry && layer.feature.properties.name === selectedCountry.name;
  if (!isSelected) countriesLayer.resetStyle(layer);
  if (!selectedCountry) setPanel('Carte Monde', 'Cliquez sur un pays');
}
function onCountryClick(e) {
  const layer = e.target;
  const name  = layer.feature.properties.name || '';

  // Désélectionner l'ancien
  if (selectedCountry) countriesLayer.resetStyle(selectedCountry.layer);

  selectedCountry = { name, feature: layer.feature, layer };
  layer.setStyle({ fillColor: C.landSelected, weight:1.5, color: C.borderHover });
  layer.bringToFront();
  setPanel(name, 'Pays');

  // Zoomer sur le pays
  map.fitBounds(layer.getBounds(), { padding: [30, 30], maxZoom: 7 });
}

/* ══ GESTION ZOOM → RÉGIONS ══ */
map.on('zoomend', () => {
  if (map.getZoom() >= ZOOM_REGIONS && selectedCountry) {
    showRegions(selectedCountry.name);
  } else if (map.getZoom() < ZOOM_REGIONS - 1) {
    hideRegions();
  }
});

async function showRegions(countryName) {
  if (regionsLayer) return; // déjà affiché

  const idx = await loadRegionsIndex();
  const entry = idx[countryName];
  if (!entry) return; // pas de données pour ce pays

  setBadge(`Chargement des régions de ${countryName}…`);

  let features;
  if (regionsCache[entry.slug]) {
    features = regionsCache[entry.slug];
  } else {
    try {
      const res = await fetch(`${REGIONS_DIR}/${entry.slug}.json`);
      const geo  = await res.json();
      features = geo.features || [];
      regionsCache[entry.slug] = features;
    } catch (e) {
      setBadge(`${countryName} — pays`);
      return;
    }
  }

  // Cacher le pays lui-même pour éviter la superposition
  if (selectedCountry) selectedCountry.layer.setStyle({ fillOpacity: 0 });

  regionsLayer = L.geoJSON(features, {
    style: regionStyle,
    onEachFeature: (feat, layer) => {
      layer.on({ mouseover: onRegionOver, mouseout: onRegionOut, click: onRegionClick });
    }
  }).addTo(map);

  setBadge(`${countryName} — régions`);
  document.getElementById('btn-back').style.display = 'block';
}

function hideRegions() {
  if (!regionsLayer) return;
  map.removeLayer(regionsLayer);
  regionsLayer = null;
  if (selectedCountry) selectedCountry.layer.setStyle({ fillOpacity: 0.9 });
  setBadge('Vue mondiale — pays');
  setPanel(selectedCountry ? selectedCountry.name : 'Carte Monde',
           selectedCountry ? 'Pays' : 'Cliquez sur un pays');
  document.getElementById('btn-back').style.display = 'none';
}

/* ── Style régions : légère variation de teinte par région ── */
function regionStyle() {
  const j = (Math.random() - 0.5) * 30; // variation de luminosité
  const hue = 210, sat = 18, lum = Math.max(25, Math.min(55, 40 + j));
  return {
    fillColor:   `hsl(${hue},${sat}%,${lum}%)`,
    fillOpacity: 0.92,
    color:       C.regionBorder,
    weight:      0.8,
    opacity:     1,
  };
}

let _regionStyles = new WeakMap(); // mémoïser les styles par layer
function onRegionOver(e) {
  const l = e.target;
  if (!_regionStyles.has(l)) _regionStyles.set(l, {...l.options});
  l.setStyle({ fillOpacity: 1, weight: 1.5, color: '#7aaccc' });
  l.bringToFront();
  setPanel(l.feature.properties.name || 'Région',
           (selectedCountry?.name || '') + ' · Région');
}
function onRegionOut(e) {
  const l = e.target;
  const saved = _regionStyles.get(l);
  if (saved) l.setStyle(saved);
  setPanel(selectedCountry?.name || 'Carte Monde',
           selectedCountry ? 'Pays — régions' : 'Cliquez sur un pays');
}
function onRegionClick(e) {
  // Colorier la région sélectionnée (rétablir les autres)
  regionsLayer.eachLayer(l => {
    const saved = _regionStyles.get(l);
    if (saved) l.setStyle(saved);
  });
  const l = e.target;
  l.setStyle({ fillColor: C.regionSelected, fillOpacity: 0.95, weight:1.5, color:'#c0a030' });
  l.bringToFront();
  setPanel(l.feature.properties.name || 'Région',
           (selectedCountry?.name || '') + ' · Région');
  L.DomEvent.stopPropagation(e);
}

/* ══ INDEX RÉGIONS ══ */
async function loadRegionsIndex() {
  if (regionsIndex) return regionsIndex;
  const res = await fetch(`${REGIONS_DIR}/_index.json`);
  regionsIndex = await res.json();
  return regionsIndex;
}

/* ══ BOUTON RETOUR ══ */
document.getElementById('btn-back').addEventListener('click', () => {
  hideRegions();
  if (selectedCountry) map.fitBounds(selectedCountry.layer.getBounds(), { padding:[30,30] });
});

/* ══ UI ══ */
function setPanel(name, sub) {
  document.getElementById('p-name').textContent = name;
  document.getElementById('p-sub').textContent  = sub;
}
function setBadge(t) { document.getElementById('badge').textContent = t; }

/* ══ DÉMARRAGE ══ */
loadCountries().catch(e => {
  document.getElementById('loader').querySelector('p').textContent = '❌ ' + e.message;
});
</script>
</body>
</html>
