<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Globe 3D — Pays &amp; Régions</title>

  <!-- Three.js (rendu 3D) + TopoJSON (décodage frontières) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05070d;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      color: #e4ecf7;
    }

    #globe-canvas {
      display: block;
      position: fixed;
      inset: 0;
      cursor: grab;
    }
    #globe-canvas:active { cursor: grabbing; }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #05070d;
      z-index: 50;
      transition: opacity .4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(120,150,200,.15);
      border-top-color: #7a96c8;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #load-msg { font-size: 13px; color: rgba(150,170,210,.7); }

    /* ── Panneau nom (minimal) ── */
    #panel {
      position: fixed;
      top: 18px; right: 18px;
      background: rgba(10,14,24,0.88);
      border: 1px solid rgba(120,150,200,0.18);
      border-radius: 10px;
      padding: 12px 18px;
      backdrop-filter: blur(10px);
      z-index: 10;
      min-width: 160px;
      text-align: right;
    }
    #p-name {
      font-size: 16px;
      font-weight: 500;
      color: #fff;
    }
    #p-sub {
      font-size: 11px;
      color: rgba(150,170,210,.5);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 2px;
    }

    /* ── Zoom controls ── */
    #zoom-ctrl {
      position: fixed;
      top: 18px; left: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }
    .zb {
      width: 32px; height: 32px;
      background: rgba(10,14,24,0.85);
      border: 1px solid rgba(120,150,200,0.18);
      border-radius: 8px;
      color: #9ab0d8;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .zb:hover { background: rgba(120,150,200,.12); }

    /* ── Mode indicator ── */
    #mode-badge {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(10,14,24,0.85);
      border: 1px solid rgba(120,150,200,0.18);
      border-radius: 16px;
      padding: 6px 16px;
      font-size: 11px;
      color: rgba(150,170,210,.65);
      letter-spacing: .04em;
      backdrop-filter: blur(8px);
      z-index: 10;
      pointer-events: none;
      transition: opacity .3s;
    }

    /* ── Tooltip survol ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(10,14,24,0.92);
      border: 1px solid rgba(120,150,200,0.22);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #c0d0f0;
      display: none;
      white-space: nowrap;
      z-index: 20;
    }

    /* ── Hint ── */
    #hint {
      position: fixed;
      bottom: 20px; right: 18px;
      font-size: 11px;
      color: rgba(120,150,200,.35);
      z-index: 10;
      pointer-events: none;
    }

    /* ── Bouton retour ── */
    #btn-back {
      position: fixed;
      bottom: 56px; left: 50%;
      transform: translateX(-50%);
      background: rgba(20,26,40,0.9);
      border: 1px solid rgba(120,150,200,0.25);
      border-radius: 16px;
      padding: 7px 18px;
      font-size: 12px;
      color: #c0d0f0;
      cursor: pointer;
      backdrop-filter: blur(8px);
      z-index: 10;
      transition: background .15s;
    }
    #btn-back:hover { background: rgba(120,150,200,.18); }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="load-msg">Chargement du globe…</p>
</div>

<canvas id="globe-canvas"></canvas>

<div id="zoom-ctrl">
  <button class="zb" id="btn-zi" title="Zoomer">+</button>
  <button class="zb" id="btn-zo" title="Dézoomer">−</button>
</div>

<div id="panel">
  <div id="p-name">🌍 Globe</div>
  <div id="p-sub">Cliquez sur un pays</div>
</div>

<div id="mode-badge">Vue mondiale — pays</div>
<button id="btn-back" style="display:none;">← Retour au monde</button>
<div id="tooltip"></div>
<div id="hint">Glisser · Scroll pour zoomer</div>

<script src="globe.js"></script>
</body>
</html>
